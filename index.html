<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PolyBot">
    <title>PolyBot Dashboard v2.1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #07070d; --surface: #0e0e16; --card: #13131d; --card-hover: #181826;
            --border: #1e1e2e; --border-glow: rgba(240, 180, 41, 0.15);
            --accent: #f0b429; --accent-dim: rgba(240, 180, 41, 0.15); --accent-glow: rgba(240, 180, 41, 0.3);
            --green: #00d4aa; --green-dim: rgba(0, 212, 170, 0.12);
            --red: #ff4757; --red-dim: rgba(255, 71, 87, 0.12);
            --blue: #4d9fff; --blue-dim: rgba(77, 159, 255, 0.12);
            --text: #e8e8f0; --text-secondary: #9898b0; --muted: #5a5a72; --radius: 14px;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 72px; overflow-x: hidden; }
        .header { background: linear-gradient(180deg, var(--surface) 0%, rgba(14,14,22,0.95) 100%); border-bottom: 1px solid var(--border); padding: 14px 16px 12px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; letter-spacing: 0.1em; color: var(--accent); }
        .logo span { color: var(--text); font-weight: 400; }
        .status-badge { display: flex; align-items: center; gap: 7px; font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 5px 10px; border-radius: 20px; background: var(--green-dim); border: 1px solid rgba(0, 212, 170, 0.2); }
        .status-badge.offline { background: var(--red-dim); border-color: rgba(255, 71, 87, 0.2); }
        .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
        .pulse.off { background: var(--red); box-shadow: none; animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.9); } }
        .bot-controls { display: flex; gap: 8px; }
        .ctrl-btn { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
        .ctrl-btn.start { border-color: rgba(0,212,170,0.3); color: var(--green); }
        .ctrl-btn.stop { border-color: rgba(255,71,87,0.3); color: var(--red); }
        .ctrl-btn.restart { border-color: rgba(77,159,255,0.3); color: var(--blue); }
        .ctrl-btn:disabled { opacity: 0.4; }
        .tabbar { display: flex; border-top: 1px solid var(--border); background: var(--surface); position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0); }
        .tab { flex: 1; padding: 10px 4px 8px; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--muted); font-size: 10px; font-family: 'JetBrains Mono', monospace; }
        .tab.active { color: var(--accent); }
        .page { display: none; padding: 12px; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
        .card-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); margin-bottom: 12px; letter-spacing: 0.1em; display: flex; justify-content: space-between; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
        .stat-value { font-size: 22px; font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--text); }
        .stat-value.green { color: var(--green); } .stat-value.red { color: var(--red); } .stat-value.accent { color: var(--accent); }
        .stat-label { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
        .price-banner { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 12px 16px; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); }
        .price-value { font-size: 24px; font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--accent); }
        .filter-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .filter-row::-webkit-scrollbar { display: none; }
        .filter-btn { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 6px 12px; border-radius: 6px; background: var(--card); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
        .trade-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .trade-card.win { border-left: 3px solid var(--green); }
        .trade-card.loss { border-left: 3px solid var(--red); }
        .trade-left { display: flex; flex-direction: column; gap: 2px; }
        .trade-dir { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; }
        .trade-dir.up { color: var(--green); } .trade-dir.down { color: var(--red); }
        .trade-meta { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
        .trade-right { text-align: right; }
        .trade-price { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; }
        .outcome-badge { font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 4px; margin-top: 4px; display: inline-block; }
        .outcome-badge.win { background: var(--green-dim); color: var(--green); }
        .outcome-badge.loss { background: var(--red-dim); color: var(--red); }
        .outcome-badge.pending { background: rgba(240, 180, 41, 0.1); color: var(--accent); }
        .refresh-btn { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 8px; z-index: 1000; display: none; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        .danger-btn { background: var(--red-dim); color: var(--red); border-color: rgba(255, 71, 87, 0.2); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; }
        .form-control { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        .form-control:focus { outline: none; border-color: var(--accent); }
        .toggle-container { margin-bottom: 12px; padding: 12px; border: 1px solid var(--red-dim); background: rgba(255, 71, 87, 0.05); border-radius: 8px; }
    </style>
</head>

<body>
    <div class="toast" id="toast"></div>
    <div class="header">
        <div class="header-top">
            <div class="logo">POLY<span>BOT</span> <small style="font-size:10px; color:var(--muted)">v2.1</small></div>
            <div class="status-badge" id="statusBadge">
                <div class="pulse" id="statusDot"></div>
                <span id="statusText">LIVE</span>
            </div>
        </div>
        <div class="bot-controls">
            <button class="ctrl-btn start" id="btnStart" onclick="controlBot('start')">▶ START</button>
            <button class="ctrl-btn stop" id="btnStop" onclick="controlBot('stop')">■ STOP</button>
            <button class="ctrl-btn restart" id="btnRestart" onclick="controlBot('restart')">↻</button>
        </div>
    </div>

    <div class="tabbar">
        <button class="tab active" onclick="showTab('dashboard', this)">◈ Dash</button>
        <button class="tab" onclick="showTab('stats', this)">📊 Stats</button>
        <button class="tab" onclick="showTab('logs', this)">📋 Logs</button>
        <button class="tab" onclick="showTab('settings', this)">⚙ Settings</button>
    </div>

    <!-- Dashboard -->
    <div class="page active" id="page-dashboard">
        <div class="price-banner">
            <div><div class="stat-label">BTC Price</div><div class="price-value" id="btcPrice">--</div></div>
            <div style="text-align:right"><div class="stat-label">Signal</div><div id="signalBadge">--</div></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value green" id="statSuccess">--</div><div class="stat-label">Win Rate %</div></div>
            <div class="stat-card"><div class="stat-value accent" id="statTotal">--</div><div class="stat-label">Total Trades</div></div>
        </div>

        <button class="refresh-btn" onclick="fetchData()">⟳ Refresh Dashboard</button>

        <div class="card">
            <div class="card-title">📌 RECENT ACTIVITY</div>
            <div id="recentTrades"><div style="color:var(--muted); font-size:11px; padding:20px; text-align:center">No trades yet...</div></div>
        </div>
    </div>

    <!-- stats -->
    <div class="page" id="page-stats">
        <div class="filter-row">
            <button class="filter-btn" onclick="setFilter('30m', this)">30min</button>
            <button class="filter-btn active" onclick="setFilter('1h', this)">1hour</button>
            <button class="filter-btn" onclick="setFilter('6h', this)">6hours</button>
            <button class="filter-btn" onclick="setFilter('24h', this)">24hours</button>
            <button class="filter-btn" onclick="setFilter('30d', this)">30days</button>
            <button class="filter-btn" onclick="setFilter('all', this)">All Time</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value green" id="detailWins">--</div><div class="stat-label">Wins</div></div>
            <div class="stat-card"><div class="stat-value red" id="detailLosses">--</div><div class="stat-label">Losses</div></div>
        </div>

        <div class="card">
            <div class="card-title">📊 PERFORMANCE ANALYTICS</div>
            <div id="pnlHistory" style="height: 100px; display:flex; align-items:flex-end; gap:2px; margin-bottom:12px"></div>
            <div id="tradeList"></div>
        </div>
    </div>

    <!-- Logs -->
    <div class="page" id="page-logs">
        <div class="card"><div class="card-title">CONSOLE</div><div id="fullLogs" style="font-size:11px; font-family:JetBrains Mono; line-height:1.6; max-height:60vh; overflow-y:auto"></div></div>
    </div>

    <!-- Settings -->
    <div class="page" id="page-settings">
        <div class="card">
            <div class="card-title">VPS CONNECTION</div>
            <div class="form-group">
                <label>VPS API URL</label>
                <input class="form-control" id="vpsUrl" value="http://152.67.120.35:3000">
            </div>
            <button class="refresh-btn" onclick="saveSettings()">Save Connection</button>
        </div>
        
        <div class="card" id="configCard">
            <div class="card-title">STRATEGY CONFIGURATION</div>
            
            <div class="toggle-container">
                <div style="display:flex; justify-content:space-between; align-items:center; width:100%">
                    <div>
                        <div style="font-size:12px; font-weight:600; color:var(--red); font-family:'JetBrains Mono'">LIVE TRADING</div>
                        <div style="font-size:10px; color:var(--muted); margin-top:4px;">Turn off DRY RUN to place real orders</div>
                    </div>
                    <label style="position: relative; display: inline-block; width: 40px; height: 22px;">
                        <input type="checkbox" id="confLiveMode" style="opacity: 0; width: 0; height: 0;" onchange="document.getElementById('slider').style.background = this.checked ? 'var(--red)' : 'var(--muted)'; document.getElementById('slider-handle').style.transform = this.checked ? 'translateX(18px)' : 'translateX(0)';">
                        <span id="slider" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--muted); transition: .4s; border-radius: 22px;">
                            <span id="slider-handle" style="position: absolute; content: ''; height: 14px; width: 14px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;"></span>
                        </span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Bet Size (USDC) <span id="valBet">2.0</span></label>
                <input type="range" class="form-control" id="confBet" min="1" max="100" step="1" oninput="document.getElementById('valBet').innerText = this.value">
            </div>
            <div class="form-group">
                <label>Momentum Threshold <span id="valMom">0.0003</span></label>
                <input type="range" class="form-control" id="confMom" min="0.0001" max="0.0020" step="0.0001" oninput="document.getElementById('valMom').innerText = this.value">
            </div>
            <div class="form-group">
                <label>Max Trades / Hour <span id="valMax">5</span></label>
                <input type="range" class="form-control" id="confMax" min="1" max="20" step="1" oninput="document.getElementById('valMax').innerText = this.value">
            </div>
            <div class="form-group">
                <label>Trade Cooldown (sec) <span id="valCool">60</span></label>
                <input type="range" class="form-control" id="confCool" min="30" max="600" step="10" oninput="document.getElementById('valCool').innerText = this.value">
            </div>
            <button class="refresh-btn" style="border-color:var(--accent-glow)" onclick="saveBotConfig()">UPDATE STRATEGY</button>
        </div>
    </div>

    <script>
        let VPS_URL = localStorage.getItem('vpsUrl') || 'http://152.67.120.35:3000';
        let currentFilter = '1h';

        function showTab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            btn.classList.add('active');
            fetchData();
        }

        function setFilter(p, btn) {
            currentFilter = p;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchData();
        }

        async function fetchData() {
            try {
                // Fetch stats with filter
                const statsResp = await fetch(`${VPS_URL}/stats?period=${currentFilter}`);
                const stats = await statsResp.json();
                
                document.getElementById('statSuccess').textContent = stats.success_rate + '%';
                document.getElementById('statTotal').textContent = stats.total_trades;
                document.getElementById('detailWins').textContent = stats.wins;
                document.getElementById('detailLosses').textContent = stats.losses;

                // Update trade list
                const tradeList = document.getElementById('tradeList');
                const recentTrades = document.getElementById('recentTrades');
                let html = stats.history.slice().reverse().map(t => {
                    const statusClass = t.outcome || 'pending';
                    const dirArrow = t.direction === 'UP' ? '▲' : '▼';
                    return `
                        <div class="trade-card ${statusClass}">
                            <div class="trade-left">
                                <div class="trade-dir ${t.direction.toLowerCase()}">${dirArrow} ${t.direction}</div>
                                <div class="trade-meta">${new Date(t.timestamp).toLocaleTimeString()}</div>
                            </div>
                            <div class="trade-right">
                                <div class="trade-price">$${parseFloat(t.btc_price).toLocaleString()}</div>
                                <div class="outcome-badge ${statusClass}">${statusClass.toUpperCase()}</div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                tradeList.innerHTML = html || 'No data for this period';
                if(recentTrades) recentTrades.innerHTML = html.split('</div></div></div>').slice(0, 5).join('</div></div></div>');

                // Status & Config
                const statusResp = await fetch(`${VPS_URL}/status`);
                const status = await statusResp.json();
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                if(status.running) { dot.classList.remove('off'); text.textContent = 'ONLINE'; }
                else { dot.classList.add('off'); text.textContent = 'OFFLINE'; }

                // BTC Price (From Binance directly for speed)
                const btcResp = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const btc = await btcResp.json();
                document.getElementById('btcPrice').textContent = '$' + parseFloat(btc.price).toLocaleString();

            } catch (e) {
                console.error(e);
                document.getElementById('statusText').textContent = 'CONNECTION ERROR';
            }
        }

        async function controlBot(action) {
            try {
                await fetch(`${VPS_URL}/${action}`, { method: 'POST' });
                fetchData();
            } catch (e) { alert('Error: ' + e.message); }
        }

        async function fetchConfig() {
            try {
                const resp = await fetch(`${VPS_URL}/config`);
                const conf = await resp.json();
                
                const liveToggle = document.getElementById('confLiveMode');
                liveToggle.checked = !conf.dry_run;
                document.getElementById('slider').style.background = liveToggle.checked ? 'var(--red)' : 'var(--muted)';
                document.getElementById('slider-handle').style.transform = liveToggle.checked ? 'translateX(18px)' : 'translateX(0)';

                document.getElementById('confBet').value = conf.bet_size;
                document.getElementById('valBet').innerText = conf.bet_size;

                document.getElementById('confMom').value = conf.momentum_threshold;
                document.getElementById('valMom').innerText = conf.momentum_threshold;

                document.getElementById('confMax').value = conf.max_trades_per_hour;
                document.getElementById('valMax').innerText = conf.max_trades_per_hour;

                document.getElementById('confCool').value = conf.cooldown_seconds;
                document.getElementById('valCool').innerText = conf.cooldown_seconds;

            } catch(e) { console.log("Config load error"); }
        }

        async function saveBotConfig() {
            try {
                const conf = {
                    dry_run: !document.getElementById('confLiveMode').checked,
                    bet_size: parseFloat(document.getElementById('confBet').value),
                    momentum_threshold: parseFloat(document.getElementById('confMom').value),
                    max_trades_per_hour: parseInt(document.getElementById('confMax').value),
                    cooldown_seconds: parseInt(document.getElementById('confCool').value)
                };
                
                await fetch(`${VPS_URL}/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(conf)
                });
                showToast('Strategy Updated!');
                fetchData();
            } catch(e) { alert('Error saving: ' + e.message); }
        }

        function saveSettings() {
            VPS_URL = document.getElementById('vpsUrl').value;
            localStorage.setItem('vpsUrl', VPS_URL);
            fetchData();
            fetchConfig();
            showToast('Connection Saved!');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        setInterval(fetchData, 10000);
        fetchData();
        fetchConfig();
    </script>
</body>
</html>
