<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PolyBot Dashboard</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#08080f;color:#e2e2f0;font-family:'Inter',sans-serif;min-height:100dvh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px}
  .logo{display:flex;align-items:center;gap:10px}
  .dot{width:12px;height:12px;border-radius:50%;background:#f0b429;box-shadow:0 0 12px rgba(240,180,41,0.6)}
  h1{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#f0b429;letter-spacing:2px}
  .loader{width:32px;height:32px;border:3px solid #2a2a3e;border-top-color:#f0b429;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  p{font-family:'JetBrains Mono',monospace;font-size:12px;color:#8888a0}
  a{color:#4d9fff;text-decoration:none}
  a:hover{text-decoration:underline}
</style>
</head>
<body>
  <div class="logo">
    <span class="dot"></span>
    <h1>POLYBOT</h1>
  </div>
  <div class="loader"></div>
  <p>Loading dashboard...</p>
  <p style="font-size:10px;color:#555570">Not redirected? <a href="dashboard/index.html">Open Dashboard</a></p>
  <script>setTimeout(function(){window.location.href='dashboard/index.html'},500)</script>
</body>
</html>
